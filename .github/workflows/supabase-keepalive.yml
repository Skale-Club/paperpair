name: supabase-keepalive

on:
  schedule:
    # Mon / Wed / Fri at 08:00 UTC — max gap = 3 days, well within Supabase's 7-day pause window
    - cron: "0 8 * * 1"
    - cron: "0 8 * * 3"
    - cron: "0 8 * * 5"
  workflow_dispatch:

jobs:
  keepalive:
    name: Ping Supabase
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      # Primary: hit Supabase APIs directly so the activity is registered even if Vercel is down
      - name: Ping Supabase REST + Auth
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          FAILED=0

          for ENDPOINT in \
            "${SUPABASE_URL}/rest/v1/" \
            "${SUPABASE_URL}/auth/v1/settings"; do

            HTTP=$(curl --silent --max-time 20 --write-out "%{http_code}" \
              -o /dev/null \
              -H "apikey: $SUPABASE_SERVICE_ROLE_KEY" \
              -H "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY" \
              "$ENDPOINT")

            echo "$ENDPOINT → HTTP $HTTP"

            if [ "$HTTP" != "200" ]; then
              echo "::error::Supabase returned HTTP $HTTP for $ENDPOINT — project may be paused or credentials are wrong."
              FAILED=1
            fi
          done

          exit $FAILED

      # Secondary: full app health check through Vercel (non-blocking — Vercel issues shouldn't break keepalive)
      - name: Ping Vercel app health check
        continue-on-error: true
        env:
          KEEPALIVE_URL: ${{ secrets.KEEPALIVE_URL }}
          KEEPALIVE_SECRET: ${{ secrets.KEEPALIVE_SECRET }}
        run: |
          HTTP=$(curl --silent --max-time 20 --write-out "%{http_code}" \
            -o /dev/null \
            -H "Authorization: Bearer $KEEPALIVE_SECRET" \
            "$KEEPALIVE_URL/api/keepalive")
          echo "Vercel app → HTTP $HTTP"
          [ "$HTTP" = "200" ] && echo "Full app healthy." || echo "::warning::Vercel health check returned HTTP $HTTP — investigate separately."

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Supabase keepalive failed. Resume at https://supabase.com/dashboard and check https://status.supabase.com"
